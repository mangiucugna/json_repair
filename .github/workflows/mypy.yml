name: Mypy Type Check

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
      with:
        activate-environment: true

    - name: Run mypy
      run: uv run --no-default-groups --group typecheck --frozen mypy src/

    - name: Run ty
      run: uv run --no-default-groups --group typecheck --frozen ty check src/ tests/
